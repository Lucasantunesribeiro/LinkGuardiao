name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Restore
        run: dotnet restore LinkGuardiao.sln

      - name: Build
        run: dotnet build LinkGuardiao.sln --no-restore

      - name: Test
        run: dotnet test LinkGuardiao.sln --no-build

      - name: Publish Lambda artifact
        run: dotnet publish src/LinkGuardiao.Api/LinkGuardiao.Api.csproj -c Release -r linux-x64 --self-contained false -o artifacts/lambda /p:GenerateRuntimeConfigurationFiles=true

      - name: Frontend build
        working-directory: Frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: CDK synth
        working-directory: infra/cdk
        run: |
          npm ci
          npx cdk synth -c env=dev

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: linkguardiao
          directory: Frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
