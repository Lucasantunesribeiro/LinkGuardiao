name: Deploy AWS (Manual)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (dev/prod)"
        required: true
        default: "dev"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION }}

      - name: Build Lambda package
        run: |
          dotnet publish src/LinkGuardiao.Api/LinkGuardiao.Api.csproj -c Release -r linux-x64 --self-contained false -o artifacts/lambda /p:GenerateRuntimeConfigurationFiles=true

      - name: Install CDK deps
        working-directory: infra/cdk
        run: npm ci

      - name: Deploy CDK
        working-directory: infra/cdk
        run: |
          npx cdk deploy "LinkGuardiao-${{ inputs.env }}" -c env=${{ inputs.env }} -c corsAllowedOrigin=${{ secrets.CORS_ALLOWED_ORIGIN }} --require-approval never --parameters JwtSecret=${{ secrets.JWT_SECRET }}
