services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Data Source=/data/linkguardiao.db
      Jwt__Secret: ${JWT__SECRET}
      Jwt__Issuer: LinkGuardiao
      Jwt__Audience: LinkGuardiao
      Cors__AllowedOrigins__0: http://localhost:5173
      Seed__Enable: "false"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    ports:
      - "5000:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - frontend
