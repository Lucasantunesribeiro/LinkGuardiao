services:
  postgres:
    image: postgres:16-alpine
    container_name: linkguardiao-postgres
    environment:
      POSTGRES_DB: linkguardiao
      POSTGRES_USER: linkguardiao
      POSTGRES_PASSWORD: linkguardiao
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkguardiao -d linkguardiao"]
      interval: 5s
      timeout: 5s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: linkguardiao-dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "./data"]
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

  redis:
    image: redis:7-alpine
    container_name: linkguardiao-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  dynamodb_data:
  redis_data:
